name: aliis_mobile
description: Aliis — tu acompañante de salud
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Auth + DB
  supabase_flutter: ^2.8.0
  google_sign_in: ^6.2.2

  # State + Nav
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1
  go_router: ^14.6.2

  # UI
  google_fonts: ^6.2.1
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/
