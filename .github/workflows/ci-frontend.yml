name: CI — Frontend

on:
  push:
    branches: ['**']
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'

defaults:
  run:
    working-directory: frontend

jobs:
  ci:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: https://aliis.app
          NEXT_PUBLIC_API_URL: https://api.aliis.app
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          # Server-only vars needed at build time
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_EUR_MONTHLY: ${{ secrets.STRIPE_PRICE_EUR_MONTHLY }}
          STRIPE_PRICE_EUR_YEARLY: ${{ secrets.STRIPE_PRICE_EUR_YEARLY }}
          STRIPE_PRICE_USD_MONTHLY: ${{ secrets.STRIPE_PRICE_USD_MONTHLY }}
          STRIPE_PRICE_USD_YEARLY: ${{ secrets.STRIPE_PRICE_USD_YEARLY }}
          STRIPE_PRICE_MXN_MONTHLY: ${{ secrets.STRIPE_PRICE_MXN_MONTHLY }}
          STRIPE_PRICE_MXN_YEARLY: ${{ secrets.STRIPE_PRICE_MXN_YEARLY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CONTACT: mailto:hola@aliis.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
